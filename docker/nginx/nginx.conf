# Reverse proxy TERPADU -- satu pintu masuk (port 80) utk Django (API,
# admin, WebSocket) & Next.js (semua halaman lain), supaya browser lihat
# SATU origin (http://localhost) & TIDAK BUTUH CORS sama sekali antar
# keduanya (walau app ini sudah punya CORS lengkap kalau mau tetap dipisah
# origin -- tapi via nginx begini, lebih dekat pola production sungguhan
# di baliknya 1 domain).
#
# Routing:
#   /api/*, /admin/*, /static/*  -> Django (daphne, port 8000)
#   /ws/*                         -> Django (WebSocket upgrade, port 8000)
#   /*  (SISANYA)                 -> Next.js (port 3000)

upstream django_upstream {
    server django-web:8000;
}

upstream nextjs_upstream {
    server nextjs:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;  # foto wajah/attendance & upload fingerprint template bisa lumayan besar

    # --- Static files Django -- dilayani LANGSUNG nginx dari volume
    # bersama (JANGAN diproxy ke daphne, itu proses Python, tidak efisien
    # utk file statis) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- WebSocket (Channels, console real-time Active Device) ---
    location /ws/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # koneksi WS boleh nganggur lama, jangan diputus nginx duluan
    }

    # --- API Django (v1) + Admin Django ---
    # PENTING: regex HARUS spesifik "api/v1", BUKAN "api" generik --
    # NextAuth (Next.js) punya rute internal sendiri di /api/auth/* (session,
    # providers, error, dst). Kalau regex-nya cuma "^/(api|admin)/" (versi
    # SEBELUMNYA), /api/auth/* ikut ketangkap ke sini & diteruskan ke
    # Django (yang jelas tidak punya rute itu) -> 404, NextAuth jadi error
    # total krn tidak pernah dapat respons yang benar dari endpoint
    # internalnya sendiri. Dengan "api/v1" spesifik, /api/auth/* TIDAK
    # match sama sekali & jatuh ke location "/" di bawah (Next.js) -- benar.
    location ~ ^/(api/v1|admin)/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Endpoint PUSH SDK device fingerprint (root-level, lihat
    # config/urls.py -- device firmware hardcoded path /iclock/xxx, TIDAK
    # bisa diubah ke /api/iclock/xxx) ---
    location /iclock/ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # ORIGINIP -- lihat iclock/pushsdk_views.py::_resolve_request_ip,
        # dipakai skenario request-mirroring produksi (device asli ->
        # server lama -> di-mirror ke sini, REMOTE_ADDR bukan IP device
        # sebenarnya). Set header ini kalau setup mirroring dipakai:
        # proxy_set_header X-Real-IP $arg_ORIGINIP;
    }

    # --- Next.js (SEMUA sisanya: dashboard, portal, mobile, login) ---
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}