name: ccpadms-test-prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-ccpadms}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      # Dibuka ke host cuma utk MEMUDAHKAN inspeksi manual (mis. buka lewat
      # DBeaver/MySQL Workbench dari host) SELAMA testing -- boleh dihapus
      # kalau tidak perlu, service lain akses lewat network internal
      # compose (nama service `mysql`), tidak butuh port ini terbuka.
      - "3307:3306"

  # --- Django: 1 IMAGE, 2 service (web/websocket & celery worker) ---
  # Kode app di-BIND MOUNT (baris `volumes: - ..:/app` di bawah), BUKAN
  # di-COPY ke image saat build -- jadi tetap bisa edit file Python di
  # host seperti biasa (mode "development"), TANPA perlu rebuild image
  # tiap kali ganti kode (cukup restart container-nya kalau perlu apply:
  # `docker compose restart django-web django-celery`).
  django-web:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile
    restart: unless-stopped
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    environment:
      <<: &django-env
        DEBUG: ${DEBUG:-False}
        SECRET_KEY: "${SECRET_KEY:?wajib diisi di .env}"
        ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,django-web}
        CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
        SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
        CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
        TIME_ZONE: ${TIME_ZONE:-Asia/Jakarta}
        USE_TZ: ${USE_TZ:-False}
        REDIS_HOST: redis
        REDIS_PORT: 6379
        DB_ENGINE: django.db.backends.mysql
        DB_NAME: ${DB_NAME:-ccpadms}
        DB_USER: root
        DB_PASSWORD: ${DB_PASSWORD:-changeme}
        DB_HOST: mysql
        DB_PORT: 3306
        CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
        JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-30}
        JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
        # LDAP, mclock (MSSQL), dst -- lepas dari .env di root repo, TIDAK
        # di-hardcode di sini supaya kredensial tidak nyasar ke file yang
        # gampang ke-commit. Lihat docker/django/env.docker.example.
        AUTH_LDAP_SERVER_URI: ${AUTH_LDAP_SERVER_URI:-}
        AUTH_LDAP_BIND_DN: ${AUTH_LDAP_BIND_DN:-}
        AUTH_LDAP_BIND_PASSWORD: ${AUTH_LDAP_BIND_PASSWORD:-}
        AUTH_LDAP_BASE_DN: ${AUTH_LDAP_BASE_DN:-}
        AUTH_LDAP_USER_SEARCH_FILTER: ${AUTH_LDAP_USER_SEARCH_FILTER:-(uid={username})}
        AUTH_LDAP_USE_SSL: ${AUTH_LDAP_USE_SSL:-False}
        MCLOCK_ENCRYPTION_KEY: ${MCLOCK_ENCRYPTION_KEY:-}
        MCLOCK_MSSQL_HOST: ${MCLOCK_MSSQL_HOST:-}
        MCLOCK_MSSQL_PORT: ${MCLOCK_MSSQL_PORT:-1433}
        MCLOCK_MSSQL_DATABASE: ${MCLOCK_MSSQL_DATABASE:-}
        MCLOCK_MSSQL_USERNAME: ${MCLOCK_MSSQL_USERNAME:-}
        MCLOCK_MSSQL_PASSWORD_ENCRYPTED: ${MCLOCK_MSSQL_PASSWORD_ENCRYPTED:-}
        MCLOCK_MSSQL_TDS_VERSION: ${MCLOCK_MSSQL_TDS_VERSION:-7.0}
      RUN_MIGRATIONS: "true"  # HANYA service ini yang migrate/collectstatic, lihat entrypoint.sh
    volumes:
      - ..:/app
      - django_static:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Cek port HTTP daphne benar2 merespons -- daphne baru mulai listen
      # SETELAH migrate/collectstatic selesai (lihat entrypoint.sh, migrate
      # dijalankan SEBELUM `exec "$@"`), jadi healthy di sini JUGA berarti
      # migrasi sudah kelar -- dipakai django-celery & nginx di bawah utk
      # nunggu bener2 siap, bukan cuma "container sudah nyala".
      #
      # PENTING: pakai try/except HTTPError -- urllib.request.urlopen()
      # SECARA DEFAULT anggap status non-2xx/3xx (mis. 404) sbg EXCEPTION
      # (HTTPError), padahal utk kebutuhan healthcheck ini, dapat response
      # HTTP APAPUN (walau 404) SUDAH CUKUP membuktikan daphne benar2
      # listen & memproses request -- yang HARUS dianggap gagal cuma kalau
      # KONEKSINYA sendiri gagal total (server belum listen sama sekali).
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import urllib.request, urllib.error
          try:
              urllib.request.urlopen('http://localhost:8000/admin/login/', timeout=3)
          except urllib.error.HTTPError:
              pass  # dapat response HTTP (walau 4xx/5xx) = server SUDAH hidup, ini yg mau dibuktikan
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      # Sama spt MySQL di atas -- dibuka ke host utk akses langsung/debug
      # SELAMA testing (mis. `python manage.py shell` dari host via port
      # ini, atau buka http://localhost:8000 langsung tanpa lewat nginx).
      # Traffic browser NORMAL tetap lewat nginx (port 80), TIDAK lewat sini.
      - "8100:8000"

  django-celery:
    build:
      context: ..
      dockerfile: docker/django/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      <<: *django-env
      RUN_MIGRATIONS: "false"  # WAJIB false -- migrate cukup dari django-web, lihat komentar di atas
    volumes:
      - ..:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-web:
        condition: service_healthy  # tunggu migrate/collectstatic BENERAN selesai (lihat healthcheck django-web)

  nextjs:
    build:
      # ASUMSI: repo `nextadms` di-clone SEJAJAR dengan `ccpadms` (SAMA
      # seperti kerja kita sepanjang project ini) --
      #   some-folder/
      #     ccpadms/    <- docker-compose.yml ini ada di ccpadms/docker/
      #     nextadms/
      # Kalau lokasi Anda beda, sesuaikan `context:` di bawah.
      context: ../../nextadms
      dockerfile: docker/nextjs/Dockerfile
      args:
        # NEXT_PUBLIC_API_BASE_URL & NEXT_PUBLIC_WS_BASE_URL SENGAJA TIDAK
        # di-set di sini lagi -- kode frontend SEKARANG default pakai path
        # RELATIF (HTTP) & origin browser SAAT ITU (WebSocket), otomatis
        # ikut IP/domain APA PUN yang dipakai user buka halamannya (lewat
        # nginx yang menyatukan Next.js & API Django jadi 1 origin) --
        # TIDAK PERLU rebuild lagi tiap ganti cara akses (localhost, IP
        # LAN, domain lain, dst). Cukup isi kalau MEMANG butuh API di
        # origin BERBEDA (skenario Next.js & Django TIDAK disatukan nginx).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?wajib diisi di .env, generate pakai: openssl rand -base64 32}"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      # BEDA dari NEXT_PUBLIC_API_BASE_URL (itu utk BROWSER) -- ini KHUSUS
      # fetch dari SERVER Next.js sendiri (Server Component, NextAuth
      # authorize/refresh) ke Django, lewat JARINGAN INTERNAL Docker
      # Compose (nama service `django-web`), TIDAK lewat nginx/IP publik
      # sama sekali -- lebih cepat & TIDAK PERLU rebuild kalau ganti IP
      # akses publik (env var biasa spt ini dibaca saat RUNTIME, beda dari
      # NEXT_PUBLIC_* yang di-bake saat build).
      DJANGO_INTERNAL_URL: http://django-web:8000/api/v1
    depends_on:
      - django-web

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8036:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/app/staticfiles:ro
    depends_on:
      django-web:
        condition: service_healthy
      nextjs:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  django_static: