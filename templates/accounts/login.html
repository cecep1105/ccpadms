<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Internal Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">⚡</div>
      <h1 class="text-2xl font-bold text-white">Internal Portal</h1>
      <p class="text-slate-400 text-sm mt-1">Masuk menggunakan akun LDAP atau akun lokal Anda</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 px-4 py-3 rounded-lg text-sm border
            {% if message.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200
            {% else %}bg-emerald-50 text-emerald-700 border-emerald-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
          {{ form.username }}
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          {{ form.password }}
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition">
          Masuk
        </button>
      </form>

      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs text-slate-400">atau</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <a href="{% url 'mattendance:mobile_login_page' %}"
         class="w-full flex items-center justify-center gap-2 border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium py-2.5 rounded-lg transition">
        <span>📍</span> NIK Login
      </a>
    </div>
    <p class="text-center text-slate-500 text-xs mt-6">© {% now "Y" %} Internal Portal. All rights reserved.</p>
  </div>
</body>
</html>
