{% extends "mattendance/mobile_app_base.html" %}
{% block title %}Profil{% endblock %}
{% block content %}

<div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 p-5 mb-4">
  <div class="flex items-center gap-4">
    <div class="w-16 h-16 rounded-full bg-indigo-100 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-2xl font-bold shrink-0">
      {{ display_name|slice:":1"|upper }}
    </div>
    <div class="min-w-0">
      <p class="font-bold text-lg truncate">{{ display_name }}</p>
      {% if emp %}<p class="text-sm text-slate-400 dark:text-slate-500">PIN: {{ emp.PIN }}</p>{% endif %}
    </div>
  </div>
</div>

<div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 divide-y divide-slate-100 dark:divide-slate-800 overflow-hidden mb-4">
  <a href="{% url 'mattendance:mobile_change_password_page' %}" class="flex items-center gap-3 px-5 py-4 hover:bg-slate-50 dark:hover:bg-slate-800/60 transition">
    <span class="text-xl">🔒</span>
    <span class="flex-1 font-medium text-sm">Ganti Password</span>
    <span class="text-slate-300 dark:text-slate-600">›</span>
  </a>
</div>

<form method="post" action="{% url 'accounts:logout' %}">
  {% csrf_token %}
  <button type="submit"
          class="w-full flex items-center justify-center gap-2 px-5 py-4 bg-white dark:bg-slate-900 border border-rose-100 dark:border-rose-900/40 rounded-3xl text-rose-600 dark:text-rose-400 font-semibold text-sm shadow-sm hover:bg-rose-50 dark:hover:bg-rose-950/30 transition">
    <span class="text-lg">🚪</span> Keluar
  </button>
</form>

<p class="text-center text-xs text-slate-300 dark:text-slate-600 mt-6">Mobile Attendance</p>
{% endblock %}
