<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Mobile Attendance</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-indigo-700 to-slate-900 antialiased overflow-x-hidden">
  <div class="min-h-screen flex flex-col max-w-md mx-auto px-6 py-10 justify-center">

    <div class="text-center mb-10">
      <div class="w-20 h-20 rounded-3xl bg-white/10 backdrop-blur flex items-center justify-center text-4xl mx-auto mb-4 shadow-lg">
        📍
      </div>
      <h1 class="text-2xl font-bold text-white">Mobile Attendance</h1>
      <p class="text-indigo-200 text-sm mt-1">Absen kapan & di mana saja</p>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-6">
      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 px-4 py-3 rounded-2xl text-sm border
            {% if message.tags == 'error' %}bg-rose-50 text-rose-700 border-rose-200
            {% else %}bg-emerald-50 text-emerald-700 border-emerald-200{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" action="{% url 'mattendance:mobile_login_submit' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">PIN Karyawan</label>
          <input type="text" name="pin" inputmode="numeric" required autofocus placeholder="Masukkan PIN Anda"
                 class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl text-base bg-slate-50 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          <p class="text-xs text-slate-400 mt-1.5">Boleh diketik dengan atau tanpa angka 0 di depan.</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="mobile_password" required placeholder="••••••"
                 class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl text-base bg-slate-50 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
          <p class="text-xs text-slate-400 mt-1.5">Password default: <code>123456</code> (wajib diganti saat login pertama).</p>
        </div>
        <button type="submit"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg shadow-indigo-600/30 transition">
          Masuk
        </button>
      </form>
    </div>

    <p class="text-center text-indigo-200 text-xs mt-8">
      Punya akun staff? <a href="{% url 'accounts:login' %}" class="underline font-medium hover:text-white">Login di sini</a>
    </p>
  </div>
</body>
</html>
